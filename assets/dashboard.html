<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票仪表盘</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #061224;
    color: #e8f4ff;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    width: 1100px;
    padding: 20px;
  }

  /* ── 顶部标题栏 ── */
  .dashboard-header {
    background: linear-gradient(135deg, #0a2744 0%, #0d3a6e 50%, #0a2744 100%);
    border: 1px solid #1e5fa8;
    border-radius: 12px;
    padding: 18px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(74, 158, 255, 0.15);
    position: relative;
    overflow: hidden;
  }
  .dashboard-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #4A9EFF, transparent);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-logo {
    font-size: 28px;
    line-height: 1;
  }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 1px;
  }
  .header-sub {
    font-size: 12px;
    color: #7eb8e8;
    margin-top: 2px;
  }
  .header-right {
    text-align: right;
  }
  .report-time {
    font-size: 13px;
    color: #7eb8e8;
    font-family: "Consolas", monospace;
  }
  .header-note {
    font-size: 11px;
    color: #4a7ab0;
    margin-top: 4px;
  }

  /* ── 股票卡片 ── */
  .stock-card {
    background: linear-gradient(145deg, #0d2040 0%, #0a1e38 100%);
    border: 1px solid #1a3d6b;
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .card-header {
    background: linear-gradient(90deg, #112c54, #0e2445);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1a3d6b;
  }
  .stock-title {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .stock-name {
    font-size: 17px;
    font-weight: 700;
    color: #ffffff;
  }
  .stock-code {
    font-size: 11px;
    color: #7eb8e8;
    background: rgba(74,158,255,0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "Consolas", monospace;
  }
  .price-block {
    text-align: right;
  }
  .price {
    font-size: 24px;
    font-weight: 700;
    font-family: "Consolas", monospace;
    letter-spacing: 0.5px;
  }
  .change {
    font-size: 12px;
    margin-left: 8px;
    font-family: "Consolas", monospace;
  }

  /* ── 图表区 ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: #1a3d6b;
  }
  .chart-cell {
    background: #081424;
    padding: 8px 12px 10px;
  }
  .chart-label {
    font-size: 11px;
    color: #4a7ab0;
    margin-bottom: 4px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .chart-img {
    width: 100%;
    height: 180px;
    object-fit: contain;
    border-radius: 4px;
    display: block;
  }

  /* ── 资讯区 ── */
  .news-section {
    padding: 10px 18px 12px;
    border-top: 1px solid #1a3d6b;
  }
  .section-label {
    font-size: 11px;
    color: #4a7ab0;
    margin-bottom: 6px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .news-item {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 4px 0;
    border-bottom: 1px solid #0f2240;
    font-size: 12px;
    color: #c8ddf0;
  }
  .news-item:last-child { border-bottom: none; }
  .news-tag {
    background: #FF6B35;
    color: white;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .news-title {
    line-height: 1.4;
  }

  /* ── 五浪分析区 ── */
  .wave-section {
    background: #091628;
    border-top: 1px dashed #1a3d6b;
    padding: 12px 18px 14px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #FFD700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .wave-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }
  .wave-item {
    background: linear-gradient(135deg, #0d2445, #0a1e38);
    border: 1px solid #1e5fa8;
    border-radius: 6px;
    padding: 8px 6px;
    text-align: center;
  }
  .wave-badge {
    display: block;
    font-size: 14px;
    font-weight: 700;
    color: #4A9EFF;
    margin-bottom: 3px;
  }
  .wave-type {
    display: block;
    font-size: 10px;
    color: #7eb8e8;
    margin-bottom: 2px;
  }
  .wave-chg {
    display: block;
    font-size: 11px;
    font-family: "Consolas", monospace;
    color: #00D4AA;
  }
  .wave-dates {
    display: block;
    font-size: 9px;
    color: #4a7ab0;
    margin-top: 2px;
  }

  .fib-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .fib-tag {
    background: rgba(74,158,255,0.1);
    border: 1px solid #1e5fa8;
    color: #7eb8e8;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: "Consolas", monospace;
  }

  .strategy-block {
    background: rgba(0,212,170,0.05);
    border: 1px solid rgba(0,212,170,0.2);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .strategy-label {
    font-size: 11px;
    color: #00D4AA;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .strategy-item {
    font-size: 12px;
    color: #c8ddf0;
    padding: 3px 0;
    line-height: 1.4;
  }

  /* ── 底部 ── */
  .footer {
    text-align: center;
    font-size: 10px;
    color: #2a4a6a;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  /* ── 分隔线 ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #1e5fa8, transparent);
    margin: 6px 0;
  }

  /* 打印友好 */
  @media print {
    body { background: white; }
    .stock-card { break-inside: avoid; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════ -->
<!-- 顶部标题栏 -->
<!-- ══════════════════════════════════════════ -->
<div class="dashboard-header">
  <div class="header-left">
    <div class="header-logo">📊</div>
    <div>
      <div class="header-title">A股 · 港股实时监控驾驶舱</div>
      <div class="header-sub">{{TOP_INFO}}</div>
    </div>
  </div>
  <div class="header-right">
    <div class="report-time">{{REPORT_TIME}}</div>
    <div class="header-note">Powered by OpenClaw · 同花顺数据</div>
  </div>
</div>

<!-- ══════════════════════════════════════════ -->
<!-- 股票卡片列表 -->
<!-- ══════════════════════════════════════════ -->
{{STOCK_CARDS}}

<!-- ══════════════════════════════════════════ -->
<!-- 底部 -->
<!-- ══════════════════════════════════════════ -->
<div class="divider"></div>
<div class="footer">
  本报告仅供参考，不构成投资建议 · 市场有风险，投资需谨慎<br>
  OpenClaw Stock Dashboard · 同花顺数据源 · PushPlus 推送
</div>

</body>
</html>
